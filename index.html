<!-- ─── App ─── -->
<script type="text/babel">
const { SiteHeader, SiteHero, RoomsSection, AmenitiesSection, GallerySection, ContactSection, SiteFooter } = window;

function App() {
  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (!el) return;
    const screen = document.getElementById('bezel-screen');
    if (screen && screen.scrollHeight > screen.clientHeight) {
      screen.scrollTo({ top: el.offsetTop - 68, behavior: 'smooth' });
    } else {
      window.scrollTo({ top: el.offsetTop - 68, behavior: 'smooth' });
    }
  };
  return (
    <>
      <SiteHeader scrollTo={scrollTo} />
      <SiteHero scrollTo={scrollTo} />
      <RoomsSection scrollTo={scrollTo} />
      <AmenitiesSection />
      <GallerySection />
      <ContactSection />
      <SiteFooter scrollTo={scrollTo} />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
