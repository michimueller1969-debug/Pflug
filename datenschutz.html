<!DOCTYPE html>
<html lang="de">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Dancing+Script:wght@400;600&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  :root {
    --wood-50:  oklch(96% 0.025 78);
    --wood-100: oklch(91% 0.055 76);
    --wood-150: oklch(88% 0.070 75);
    --wood-200: oklch(84% 0.085 73);
    --wood-300: oklch(74% 0.110 69);
    --wood-400: oklch(63% 0.110 63);
    --wood-500: oklch(52% 0.095 56);
    --wood-600: oklch(42% 0.085 50);
    --wood-700: oklch(33% 0.070 45);
    --wood-800: oklch(24% 0.050 42);
    --wood-900: oklch(16% 0.035 38);

    --neutral-50:  oklch(98.5% 0.008 82);
    --neutral-100: oklch(95.5% 0.018 80);
    --neutral-200: oklch(90%   0.030 76);
    --neutral-300: oklch(82%   0.040 73);
    --neutral-400: oklch(70%   0.040 70);
    --neutral-500: oklch(57%   0.035 67);

    --neutral-900: oklch(14%   0.015 50);

    --olive-100: oklch(86%  0.065 122);

    --olive-500: oklch(53%  0.095 116);
    --olive-700: oklch(38%  0.078 112);

    --color-primary:        var(--wood-400);
    --color-primary-hover:  var(--wood-500);
    --color-bg:             var(--neutral-100);
    --color-surface:        var(--neutral-50);
    --color-text:           var(--neutral-900);
    --color-text-secondary: var(--neutral-600);
    --color-text-muted:     var(--neutral-500);
    --color-border:         var(--neutral-300);
    --color-border-light:   var(--neutral-200);

    --font-display: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    --font-body:    'DM Sans', system-ui, -apple-system, sans-serif;
    --font-script:  'Dancing Script', cursive;

    --text-xs:   0.75rem;
    --text-sm:   0.875rem;
    --text-base: 1rem;
    --text-lg:   1.125rem;
    --text-xl:   1.25rem;
    --text-2xl:  1.5rem;
    --text-3xl:  1.875rem;
    --text-4xl:  2.25rem;
    --text-5xl:  3rem;

    --weight-light:    300;
    --weight-normal:   400;
    --weight-medium:   500;
    --weight-semibold: 600;

    --leading-tight:   1.15;
    --leading-normal:  1.55;
    --leading-relaxed: 1.7;

    --tracking-tight:   -0.01em;

    --texture-wood-birch:

      repeating-linear-gradient(92deg, transparent 0, transparent 18px, rgba(140,100,40,0.02) 18px, rgba(140,100,40,0.02) 19px),
      linear-gradient(180deg, var(--wood-50) 0%, var(--wood-100) 45%, var(--wood-50) 100%);

    --texture-wood-oak:
      repeating-linear-gradient(87deg, transparent 0, transparent 2px, rgba(110,70,20,0.18) 2px, rgba(110,70,20,0.18) 3px, transparent 3px, transparent 8px, rgba(90,55,12,0.12) 8px, rgba(90,55,12,0.12) 9px, transparent 9px, transparent 14px, rgba(70,40,10,0.08) 14px, rgba(70,40,10,0.08) 15px),

<body>
<div id="root"></div>

<script type="text/babel">

/* ── Header ── */
function ImpressumHeader() {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? 'rgba(253,250,246,0.97)' : 'rgba(253,250,246,0.85)',
      backdropFilter: 'blur(12px)',
      boxShadow: scrolled ? 'var(--shadow-sm)' : 'none',
      borderBottom: '1px solid var(--neutral-200)',
      transition: 'box-shadow 300ms ease',
    }}>
      <div style={{
        maxWidth: 'var(--container-xl)', margin: '0 auto',
        padding: '0 var(--padding-page)',
        height: '72px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <a href="index.html" style={{
          fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: '1.5rem',
          letterSpacing: '0.02em', color: 'var(--wood-800)',
          userSelect: 'none',
        }}>
          Ferienhaus Cornberg
        </a>
        <a href="index.html" style={{
          fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)',
          fontWeight: 'var(--weight-medium)', letterSpacing: 'var(--tracking-wider)',
          textTransform: 'uppercase', color: 'var(--neutral-600)',
          display: 'flex', alignItems: 'center', gap: '6px',
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/>
          </svg>
          Zurück
        </a>
      </div>
    </header>
  );
}

/* ── Main Content ── */
function ImpressumContent() {
  const wrapStyle = {
    maxWidth: '760px', margin: '0 auto',
    padding: '140px var(--padding-page) 96px',
  };

  const eyeStyle = {
    fontFamily: 'var(--font-body)', fontSize: 'var(--text-xs)',
    letterSpacing: 'var(--tracking-widest)', textTransform: 'uppercase',
    color: 'var(--color-primary)', marginBottom: '12px',
  };
  const h1Style = {
    fontFamily: 'var(--font-display)', fontWeight: 300,
    fontSize: 'clamp(2.5rem, 5vw, 4rem)', letterSpacing: '-0.02em',
    color: 'var(--wood-800)', lineHeight: 1, marginBottom: '48px',
  };

  const sectionStyle = {
    marginBottom: '40px',
    paddingBottom: '40px',
    borderBottom: '1px solid var(--neutral-200)',
  };
  const sectionLastStyle = { marginBottom: 0 };
  const h2Style = {
    fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: '1.5rem',
    color: 'var(--wood-800)', letterSpacing: '-0.01em',
    marginBottom: '16px',
  };
  const labelStyle = {
    fontFamily: 'var(--font-body)', fontSize: 'var(--text-xs)',
    letterSpacing: '0.1em', textTransform: 'uppercase',
    color: 'var(--color-text-muted)', marginBottom: '4px',
  };
  const valueStyle = {
    fontFamily: 'var(--font-body)', fontSize: 'var(--text-base)',
    color: 'var(--color-text)', lineHeight: 1.7,
  };
  const noteStyle = {
    fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)',
    color: 'var(--color-text-secondary)', lineHeight: 1.7,
  };

  const row = (label, value, isEmail) => (
    <div style={{ marginBottom: '18px' }}>
      <div style={labelStyle}>{label}</div>
      <div style={valueStyle}>
        {isEmail
          ? <a href={`mailto:${value}`} style={{ color: 'var(--color-primary)' }}>{value}</a>
          : value}
      </div>
    </div>
  );

  return (
    <main>
      <div style={wrapStyle}>
        <p style={eyeStyle}>Rechtliches</p>
        <h1 style={h1Style}>Datenschutzerklärung</h1>

        {/* 1. Verantwortlicher */}
        <div style={sectionStyle}>
          <h2 style={h2Style}>1. Verantwortlicher</h2>
          <p style={{ ...noteStyle, marginBottom: '12px' }}>
            Verantwortlich für die Datenverarbeitung auf dieser Website ist:
          </p>
          {row('Name', 'Immobiliengemeinschaft Pflug & Krapf')}
          {row('Adresse', 'Stadtweg 6, 36179 Bebra', false)}
          {row('Telefon', '+49 160 3889917')}
          {row('E-Mail', 'info@ferienhaus-cornberg.de', true)}
        </div>

        {/* 2. Allgemeines */}
        <div style={sectionStyle}>
          <h2 style={h2Style}>2. Allgemeine Hinweise</h2>
          <p style={noteStyle}>
            Der Schutz deiner persönlichen Daten ist uns ein wichtiges Anliegen. Wir verarbeiten deine Daten ausschließlich auf Grundlage der gesetzlichen Bestimmungen (DSGVO, TDDDG). In dieser Datenschutzerklärung informieren wir dich über die wichtigsten Aspekte der Datenverarbeitung im Rahmen unserer Website.
          </p>
        </div>

        {/* 3. Hosting */}
        <div style={sectionStyle}>
          <h2 style={h2Style}>3. Hosting</h2>
          <p style={noteStyle}>
            Diese Website wird bei der STRATO AG (Otto-Ostrowski-Straße 7, 10249 Berlin) gehostet. Beim Aufruf der Website werden durch den Anbieter automatisch technische Zugriffsdaten (z. B. IP-Adresse, Datum und Uhrzeit des Zugriffs, aufgerufene Seite, verwendeter Browser) in sogenannten Server-Logfiles erfasst. Diese Verarbeitung erfolgt zur Gewährleistung eines sicheren und stabilen Betriebs der Website (Art. 6 Abs. 1 lit. f DSGVO). Mit dem Anbieter besteht ein Vertrag zur Auftragsverarbeitung (AVV) gemäß Art. 28 DSGVO.
          </p>
        </div>

        {/* 4. Kontaktaufnahme */}
        <div style={sectionStyle}>
          <h2 style={h2Style}>4. Kontaktaufnahme &amp; Buchungsanfrage</h2>
          <p style={noteStyle}>
            Wenn du über das Kontaktformular oder die Buchungsanfrage mit uns Kontakt aufnimmst, öffnet sich dein E-Mail-Programm mit den von dir eingegebenen Angaben (Name, E-Mail-Adresse, Telefonnummer, Nachricht sowie ggf. Reisezeitraum und Personenzahl). Diese Daten werden erst mit dem Versand deiner E-Mail an uns übermittelt und ausschließlich zur Bearbeitung deiner Anfrage verwendet (Art. 6 Abs. 1 lit. b DSGVO). Es findet keine automatische Speicherung auf dieser Website statt. Wir bewahren deine Anfrage nur so lange auf, wie es für die Bearbeitung erforderlich ist.
          </p>
        </div>

        {/* 5. Google Maps */}
        <div style={sectionStyle}>
          <h2 style={h2Style}>5. Google Maps</h2>
          <p style={noteStyle}>
            Zur Darstellung unseres Standorts binden wir Kartenmaterial von Google Maps ein (Anbieter: Google Ireland Limited, Gordon House, Barrow Street, Dublin 4, Irland). Beim Laden der Karte kann Google deine IP-Adresse verarbeiten und Daten in die USA übertragen. Die Nutzung erfolgt im Interesse einer ansprechenden Darstellung und leichten Auffindbarkeit unseres Angebots (Art. 6 Abs. 1 lit. f DSGVO). Weitere Informationen findest du in der Datenschutzerklärung von Google unter <a href="https://policies.google.com/privacy" target="_blank" rel="noopener" style={{ color: 'var(--color-primary)' }}>policies.google.com/privacy</a>.
          </p>
        </div>

        {/* 6. Keine Cookies */}
        <div style={sectionStyle}>
          <h2 style={h2Style}>6. Cookies &amp; Tracking</h2>
          <p style={noteStyle}>
            Diese Website setzt keine eigenen Cookies und verwendet keine Analyse- oder Tracking-Dienste. Lediglich technisch notwendige Daten zur Auslieferung der Seite werden – wie oben beschrieben – durch den Hosting-Anbieter verarbeitet.
          </p>
        </div>

        {/* 7. Rechte */}
        <div style={sectionLastStyle}>
          <h2 style={h2Style}>7. Deine Rechte</h2>
          <p style={noteStyle}>
            Dir stehen grundsätzlich die Rechte auf Auskunft, Berichtigung, Löschung, Einschränkung der Verarbeitung, Datenübertragbarkeit und Widerspruch zu. Wenn du glaubst, dass die Verarbeitung deiner Daten gegen das Datenschutzrecht verstößt, kannst du dich bei der zuständigen Aufsichtsbehörde beschweren. Für Anfragen zu deinen Daten erreichst du uns jederzeit unter <a href="mailto:info@ferienhaus-cornberg.de" style={{ color: 'var(--color-primary)' }}>info@ferienhaus-cornberg.de</a>.
          </p>
        </div>
      </div>
    </main>
  );
}

/* ── Footer ── */
function ImpressumFooter() {
  const footerStyle = {
    background: 'var(--texture-wood-oak)',
    padding: '56px var(--padding-page) 32px',
    borderTop: '1px solid rgba(0,0,0,0.1)',
  };
  const innerStyle = { maxWidth: 'var(--container-xl)', margin: '0 auto' };
  const topStyle = {
    display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: '48px',
    paddingBottom: '40px', borderBottom: '1px solid rgba(255,255,255,0.1)',
    marginBottom: '28px',
  };
  const logoStyle = {
    fontFamily: 'var(--font-display)', fontWeight: 300, fontSize: '1.8rem',
    color: '#ffffff', letterSpacing: '0.02em', marginBottom: '12px',
  };
  const taglineStyle = {
    fontFamily: 'var(--font-script)', fontSize: '1.1rem',
    color: '#ffffff', marginBottom: '16px',
  };
  const descStyle = {
    fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)',
    color: '#ffffff', lineHeight: 1.65, maxWidth: '300px',
  };
  const colHeadStyle = {
    fontFamily: 'var(--font-body)', fontSize: '9px',
    letterSpacing: '0.16em', textTransform: 'uppercase',
    color: '#ffffff', marginBottom: '16px',
  };
  const linkStyle = {
    fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)',
    color: '#ffffff', lineHeight: 2.2, display: 'block',
  };
  const bottomStyle = {
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    fontFamily: 'var(--font-body)', fontSize: '12px', color: '#ffffff',
    flexWrap: 'wrap', gap: '8px',
  };

  return (
    <footer style={footerStyle}>
      <div style={innerStyle}>
        <div style={topStyle}>
          <div>
            <div style={logoStyle}>Ferienhaus Cornberg</div>
            <div style={taglineStyle}>Ihr Zuhause auf Zeit</div>
            <p style={descStyle}>Gemütliche Wohnung mit Holzcharme und modernem Komfort — direkt buchen, ohne Gebühren.</p>
          </div>
          <div>
            <div style={colHeadStyle}>Navigation</div>
            {[['Wohnung','#wohnungen'],['Ausstattung','#ausstattung'],['Galerie','#galerie'],['Kontakt','#kontakt']].map(([l, href]) => (
              <a key={l} href={'index.html' + href} style={linkStyle}>{l}</a>
            ))}
          </div>
          <div>
            <div style={colHeadStyle}>Kontakt</div>
            <span style={{ ...linkStyle, cursor: 'default' }}>+49 160 3889917</span>
            <span style={{ ...linkStyle, cursor: 'default' }}>info@ferienhaus-cornberg.de</span>
            <span style={{ ...linkStyle, cursor: 'default' }}>Lederecke 10, 36219 Cornberg-Rockensüss</span>
          </div>
        </div>
        <div style={bottomStyle}>
          <span>© 2025 Ferienhaus Cornberg. Alle Rechte vorbehalten.</span>
          <span>
            <a href="impressum.html" style={{ color: '#ffffff', textDecoration: 'underline', textUnderlineOffset: '3px', opacity: 0.9 }}>Impressum</a>
            {' · '}
            <span style={{ opacity: 0.9 }}>Datenschutz</span>
          </span>
        </div>
      </div>
    </footer>
  );
}

/* ── App ── */
function App() {
  return (
    <>
      <ImpressumHeader />
      <ImpressumContent />
      <ImpressumFooter />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
